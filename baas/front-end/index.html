<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>while(motivation &lt;= 0)</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.28.0/themes/prism-tomorrow.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f8ff;
      color: #333;
    }

    header {
      background-color: #005f99;
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    header h1 { font-size: 1.3rem; cursor: pointer; }
    header h1:hover { text-decoration: underline; }

    nav { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    nav a, nav button {
      color: white;
      background: none;
      border: 1px solid rgba(255,255,255,0.5);
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      text-decoration: none;
    }
    nav a:hover, nav button:hover { background: rgba(255,255,255,0.15); }
    nav .token-info { font-size: 0.8rem; opacity: 0.8; }

    main { max-width: 860px; margin: 0 auto; padding: 24px 20px; }

    footer {
      background-color: #005f99;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: 40px;
      font-size: 0.9rem;
    }

    /* --- Views --- */
    .view { display: none; }
    .view.active { display: block; }

    /* --- Cards / post list --- */
    .post-card {
      background: white;
      border-radius: 8px;
      padding: 18px 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      position: relative;
    }
    .post-card h2 { font-size: 1.2rem; margin-bottom: 4px; }
    .post-card h2 a { color: #005f99; text-decoration: none; }
    .post-card h2 a:hover { text-decoration: underline; }
    .post-meta { font-size: 0.8rem; color: #777; margin-bottom: 10px; }
    .post-excerpt { font-size: 0.95rem; line-height: 1.5; max-height: 80px; overflow: hidden; position: relative; }
    .post-excerpt::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 30px;
      background: linear-gradient(transparent, white);
    }
    .post-actions { margin-top: 10px; display: flex; gap: 8px; }

    /* --- Single post --- */
    .post-full h1 { font-size: 2rem; margin-bottom: 6px; }
    .post-full .post-meta { margin-bottom: 20px; }
    .post-full .post-body { line-height: 1.7; }
    .post-full .post-body pre { margin: 12px 0; }

    /* --- Tag cloud --- */
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
    .tag-chip {
      display: inline-block;
      padding: 4px 10px;
      background: #e0f0ff;
      border-radius: 20px;
      color: #005f99;
      cursor: pointer;
      font-size: 0.85rem;
      border: 1px solid #b0d8f5;
    }
    .tag-chip:hover { background: #c0e0f8; }

    /* --- Forms --- */
    .form-card {
      background: #e6f7ff;
      padding: 24px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      max-width: 560px;
      margin: 0 auto;
    }
    .form-card h2 { margin-bottom: 18px; color: #005f99; }
    label { display: block; font-weight: bold; margin-bottom: 4px; margin-top: 12px; font-size: 0.9rem; }
    input[type="text"], input[type="password"], input[type="date"],
    input[type="file"], textarea, select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.95rem;
      font-family: inherit;
    }
    textarea { resize: vertical; min-height: 120px; }
    .editor-body { min-height: 260px; font-family: monospace; }

    .btn {
      display: inline-block;
      padding: 9px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.95rem;
      font-family: inherit;
    }
    .btn-primary { background: #005f99; color: white; }
    .btn-primary:hover { background: #004a78; }
    .btn-danger { background: #c0392b; color: white; }
    .btn-danger:hover { background: #962d22; }
    .btn-secondary { background: #888; color: white; }
    .btn-secondary:hover { background: #666; }
    .btn-sm { padding: 5px 12px; font-size: 0.82rem; }
    .mt { margin-top: 16px; }

    /* --- Admin table --- */
    .admin-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .admin-toolbar h2 { color: #005f99; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    th { background: #005f99; color: white; padding: 10px 14px; text-align: left; font-size: 0.9rem; }
    td { padding: 10px 14px; border-bottom: 1px solid #eee; font-size: 0.9rem; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f5faff; }
    .td-actions { display: flex; gap: 6px; }

    /* --- Upload --- */
    .upload-drop {
      border: 2px dashed #005f99;
      border-radius: 8px;
      padding: 30px;
      text-align: center;
      background: white;
      cursor: pointer;
      transition: background 0.2s;
    }
    .upload-drop.dragover { background: #e0f0ff; }
    .upload-drop input[type="file"] { display: none; }
    .upload-progress { margin-top: 12px; }
    progress { width: 100%; height: 14px; border-radius: 7px; }

    /* --- Alerts --- */
    .alert {
      padding: 10px 14px;
      border-radius: 6px;
      margin-bottom: 14px;
      font-size: 0.9rem;
    }
    .alert-error { background: #fde8e8; border: 1px solid #e8a0a0; color: #7a1a1a; }
    .alert-success { background: #e8fde8; border: 1px solid #a0c8a0; color: #1a5a1a; }
    .alert-info { background: #e8f0fd; border: 1px solid #a0b8e8; color: #1a2a7a; }

    /* --- Spinner --- */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid #cce4f5;
      border-top-color: #005f99;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-block { text-align: center; padding: 40px; color: #777; }

    /* --- Misc --- */
    .section-title { color: #005f99; margin-bottom: 14px; font-size: 1.3rem; }
    .empty-state { text-align: center; padding: 40px; color: #999; font-size: 1rem; }
    .inline-badge {
      display: inline-block;
      background: #e0f0ff;
      color: #005f99;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 0.75rem;
      margin-left: 6px;
    }
  </style>
</head>
<body>

<header>
  <h1 onclick="navigate('posts')">while(motivation &lt;= 0)</h1>
  <nav>
    <a onclick="navigate('posts')">Posts</a>
    <div id="nav-auth"></div>
  </nav>
</header>

<main>
  <!-- Alert bar -->
  <div id="global-alert" style="display:none"></div>

  <!-- Posts list -->
  <div id="view-posts" class="view">
    <div id="tag-cloud-container"></div>
    <div id="post-list-header" class="section-title">All Posts</div>
    <div id="post-list"><div class="loading-block"><span class="spinner"></span> Loading posts…</div></div>
  </div>

  <!-- Single post -->
  <div id="view-post" class="view">
    <div id="post-detail"></div>
  </div>

  <!-- Login -->
  <div id="view-login" class="view">
    <div class="form-card">
      <h2>Admin Login</h2>
      <div id="login-alert"></div>
      <form id="login-form" onsubmit="submitLogin(event)">
        <label>Username</label>
        <input type="text" id="login-username" autocomplete="username" required>
        <label>Password</label>
        <input type="password" id="login-password" autocomplete="current-password" required>
        <label>OTP Code</label>
        <input type="text" id="login-otp" maxlength="6" pattern="\d{6}" placeholder="6-digit code" required>
        <div class="mt">
          <button type="submit" class="btn btn-primary" id="login-btn">Login</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Admin dashboard -->
  <div id="view-admin" class="view">
    <div class="admin-toolbar">
      <h2 class="section-title" style="margin:0">Admin — Posts</h2>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary btn-sm" onclick="navigate('editor')">+ New Post</button>
        <button class="btn btn-secondary btn-sm" onclick="navigate('upload')">Upload File</button>
      </div>
    </div>
    <div id="admin-post-list"><div class="loading-block"><span class="spinner"></span> Loading…</div></div>
  </div>

  <!-- Post editor (create / edit) -->
  <div id="view-editor" class="view">
    <div class="form-card" style="max-width:720px">
      <h2 id="editor-title">New Post</h2>
      <div id="editor-alert"></div>
      <form id="editor-form" onsubmit="submitPost(event)">
        <input type="hidden" id="editor-post-id" value="">
        <label>Subject / Title</label>
        <input type="text" id="editor-subject" required>
        <label>Date</label>
        <input type="date" id="editor-date" required>
        <label>RSS Description</label>
        <input type="text" id="editor-rss">
        <label>SEO Keywords <span style="font-weight:normal;color:#777">(comma-separated)</span></label>
        <input type="text" id="editor-seo" placeholder="python, aws, serverless">
        <label>Body <span style="font-weight:normal;color:#777">(HTML supported)</span></label>
        <textarea id="editor-body" class="editor-body" required></textarea>
        <div class="mt" style="display:flex;gap:10px;flex-wrap:wrap">
          <button type="submit" class="btn btn-primary" id="editor-submit-btn">Save Post</button>
          <button type="button" class="btn btn-secondary" onclick="navigate('admin')">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- File upload -->
  <div id="view-upload" class="view">
    <div class="form-card" style="max-width:560px">
      <h2>Upload File</h2>
      <div id="upload-alert"></div>
      <label>Destination Bucket</label>
      <select id="upload-bucket">
        <option value="public">Public (CDN)</option>
        <option value="internal">Internal</option>
      </select>
      <div class="mt">
        <div class="upload-drop" id="upload-drop" onclick="document.getElementById('upload-file-input').click()">
          <input type="file" id="upload-file-input" onchange="fileSelected(this.files[0])">
          <p>Click or drag &amp; drop a file here</p>
          <p style="font-size:0.8rem;color:#777;margin-top:6px">Allowed: png jpg jpeg gif mov webm mp4 zip</p>
        </div>
      </div>
      <div id="upload-filename" style="margin-top:10px;font-size:0.9rem;color:#555"></div>
      <div id="upload-progress-area" class="upload-progress" style="display:none">
        <progress id="upload-progress-bar" value="0" max="100"></progress>
        <div id="upload-status" style="font-size:0.85rem;color:#555;margin-top:4px"></div>
      </div>
      <div class="mt" style="display:flex;gap:10px">
        <button class="btn btn-primary" onclick="startUpload()" id="upload-btn" disabled>Upload</button>
        <button class="btn btn-secondary" onclick="navigate('admin')">Back</button>
      </div>
    </div>
  </div>

</main>

<footer>
  <p>© 2024 Another unused blog</p>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.28.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.28.0/components/prism-bash.min.js"></script>
<script>
// ─── Configuration ────────────────────────────────────────────────────────────
const API_BASE = 'https://spaceapi.cmh.sh/baas';

// ─── State ────────────────────────────────────────────────────────────────────
let currentView = null;
let selectedUploadFile = null;

// ─── API client ───────────────────────────────────────────────────────────────
async function api(method, path, body = null) {
  const headers = {};
  // Only set Content-Type when sending a body — GET/DELETE without a body
  // must not send Content-Type or the browser triggers a CORS preflight.
  if (body !== null) headers['Content-Type'] = 'application/json';
  const token = localStorage.getItem('api_key');
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const opts = { method, headers };
  if (body !== null) opts.body = JSON.stringify(body);
  const resp = await fetch(API_BASE + path, opts);
  const data = await resp.json().catch(() => ({}));
  return { ok: resp.ok, status: resp.status, data };
}

// ─── Auth helpers ─────────────────────────────────────────────────────────────
function getToken()    { return localStorage.getItem('api_key'); }
function getExpiry()   { return localStorage.getItem('api_key_expires'); }
function isLoggedIn()  {
  const token = getToken();
  const exp   = getExpiry();
  if (!token || !exp) return false;
  return new Date(exp) > new Date();
}
function saveToken(api_key, expires_at) {
  localStorage.setItem('api_key', api_key);
  localStorage.setItem('api_key_expires', expires_at);
}
function clearToken() {
  localStorage.removeItem('api_key');
  localStorage.removeItem('api_key_expires');
}

// ─── Navigation ───────────────────────────────────────────────────────────────
function navigate(view, params = {}) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const el = document.getElementById('view-' + view);
  if (!el) return;
  el.classList.add('active');
  currentView = view;
  renderNav();
  hideGlobalAlert();
  // Route-specific load
  if (view === 'posts')  loadPosts(params.tag || null);
  if (view === 'post')   loadPost(params.id);
  if (view === 'admin')  { if (!isLoggedIn()) { navigate('login'); return; } loadAdminPosts(); }
  if (view === 'editor') { if (!isLoggedIn()) { navigate('login'); return; } setupEditor(params.id || null); }
  if (view === 'upload') { if (!isLoggedIn()) { navigate('login'); return; } resetUpload(); }
}

function renderNav() {
  const nav = document.getElementById('nav-auth');
  if (isLoggedIn()) {
    const exp = new Date(getExpiry());
    const hhmm = exp.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    nav.innerHTML = `
      <span class="token-info">Token expires ${hhmm}</span>
      <a onclick="navigate('admin')">Admin</a>
      <button onclick="logout()">Logout</button>`;
  } else {
    nav.innerHTML = `<a onclick="navigate('login')">Login</a>`;
  }
}

function logout() {
  clearToken();
  navigate('posts');
}

// ─── Alerts ───────────────────────────────────────────────────────────────────
function showAlert(containerId, msg, type = 'error') {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = `<div class="alert alert-${type}">${escHtml(msg)}</div>`;
}
function hideAlert(containerId) {
  const el = document.getElementById(containerId);
  if (el) el.innerHTML = '';
}
function showGlobalAlert(msg, type = 'info') {
  const el = document.getElementById('global-alert');
  el.innerHTML = `<div class="alert alert-${type}" style="margin-bottom:16px">${escHtml(msg)}</div>`;
  el.style.display = 'block';
}
function hideGlobalAlert() {
  const el = document.getElementById('global-alert');
  el.style.display = 'none';
  el.innerHTML = '';
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
function fmtDate(d) {
  if (!d) return '';
  return String(d).substring(0, 10);
}

// ─── Posts list ───────────────────────────────────────────────────────────────
async function loadPosts(filterTag = null) {
  const listEl  = document.getElementById('post-list');
  const headEl  = document.getElementById('post-list-header');
  const cloudEl = document.getElementById('tag-cloud-container');

  listEl.innerHTML = '<div class="loading-block"><span class="spinner"></span> Loading posts…</div>';

  // Load tags + posts in parallel
  const [tagsRes, postsRes] = await Promise.all([
    api('GET', '/tags'),
    filterTag ? api('GET', `/tags/${encodeURIComponent(filterTag)}/posts`) : api('GET', '/posts')
  ]);

  // Tag cloud
  if (tagsRes.ok && tagsRes.data.tags) {
    const { tags, max_count, min_count, max_font_size, min_font_size } = tagsRes.data;
    const range = max_count - min_count || 1;
    const chips = Object.entries(tags).sort((a, b) => b[1] - a[1]).map(([name, count]) => {
      const size = min_font_size + ((count - min_count) / range) * (max_font_size - min_font_size);
      const active = filterTag === name ? 'style="background:#005f99;color:white;border-color:#005f99"' : '';
      return `<span class="tag-chip" ${active} style="font-size:${size.toFixed(0)}px"
                onclick="navigate('posts',{tag:'${escHtml(name)}'})">
                ${escHtml(name)} <sup>${count}</sup></span>`;
    }).join('');
    cloudEl.innerHTML = `<div class="tag-cloud">${chips}</div>`;
    if (filterTag) {
      cloudEl.innerHTML += `<p style="margin-bottom:12px;font-size:0.85rem">
        Filtering by tag: <strong>${escHtml(filterTag)}</strong>
        <a href="#" onclick="navigate('posts');return false" style="margin-left:8px">clear</a></p>`;
    }
  } else {
    cloudEl.innerHTML = '';
  }

  headEl.textContent = filterTag ? `Posts tagged "${filterTag}"` : 'All Posts';

  if (!postsRes.ok) {
    listEl.innerHTML = `<div class="alert alert-error">Failed to load posts.</div>`;
    return;
  }
  const posts = postsRes.data;
  if (!posts.length) {
    listEl.innerHTML = '<div class="empty-state">No posts found.</div>';
    return;
  }

  listEl.innerHTML = posts.map(p => `
    <div class="post-card">
      <h2><a onclick="navigate('post',{id:${p.id}})">${escHtml(p.subject)}</a></h2>
      <div class="post-meta">${fmtDate(p.date)}</div>
      <div class="post-excerpt">${escHtml(p.rss_description || '')}</div>
      <div class="post-actions">
        <a class="btn btn-primary btn-sm" onclick="navigate('post',{id:${p.id}})">Read more</a>
        ${isLoggedIn() ? `
          <button class="btn btn-secondary btn-sm" onclick="navigate('editor',{id:${p.id}})">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deletePost(${p.id})">Delete</button>` : ''}
      </div>
    </div>`).join('');
}

// ─── Single post ──────────────────────────────────────────────────────────────
async function loadPost(id) {
  const el = document.getElementById('post-detail');
  el.innerHTML = '<div class="loading-block"><span class="spinner"></span> Loading…</div>';
  const { ok, data } = await api('GET', `/posts/${id}`);
  if (!ok) {
    el.innerHTML = `<div class="alert alert-error">${escHtml(data.error || 'Post not found')}</div>`;
    return;
  }
  el.innerHTML = `
    <div class="post-full">
      <h1>${escHtml(data.subject)}</h1>
      <div class="post-meta">${fmtDate(data.date)}
        ${data.seo_keywords ? data.seo_keywords.split(',').map(t =>
          `<span class="inline-badge" onclick="navigate('posts',{tag:'${escHtml(t.trim())}'})">
            ${escHtml(t.trim())}</span>`).join('') : ''}
      </div>
      ${isLoggedIn() ? `
        <div style="margin-bottom:16px;display:flex;gap:8px">
          <button class="btn btn-secondary btn-sm" onclick="navigate('editor',{id:${data.id}})">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deletePost(${data.id})">Delete</button>
        </div>` : ''}
      <div class="post-body">${data.body || ''}</div>
      <div style="margin-top:24px">
        <button class="btn btn-secondary btn-sm" onclick="navigate('posts')">← Back to posts</button>
      </div>
    </div>`;
  Prism.highlightAll();
}

// ─── Login ────────────────────────────────────────────────────────────────────
async function submitLogin(e) {
  e.preventDefault();
  hideAlert('login-alert');
  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Logging in…';

  const { ok, data } = await api('POST', '/login', {
    username: document.getElementById('login-username').value,
    password: document.getElementById('login-password').value,
    otp:      document.getElementById('login-otp').value.trim(),
  });

  btn.disabled = false;
  btn.textContent = 'Login';

  if (ok && data.api_key) {
    saveToken(data.api_key, data.expires_at);
    document.getElementById('login-form').reset();
    navigate('admin');
  } else {
    showAlert('login-alert', data.error || 'Login failed', 'error');
  }
}

// ─── Admin post table ─────────────────────────────────────────────────────────
async function loadAdminPosts() {
  const el = document.getElementById('admin-post-list');
  el.innerHTML = '<div class="loading-block"><span class="spinner"></span> Loading…</div>';
  const { ok, data } = await api('GET', '/posts');
  if (!ok) {
    el.innerHTML = `<div class="alert alert-error">Failed to load posts.</div>`;
    return;
  }
  if (!data.length) {
    el.innerHTML = '<div class="empty-state">No posts yet. Create one!</div>';
    return;
  }
  el.innerHTML = `
    <table>
      <thead><tr><th>ID</th><th>Subject</th><th>Date</th><th>Tags</th><th>Actions</th></tr></thead>
      <tbody>
        ${data.map(p => `
          <tr>
            <td>${p.id}</td>
            <td><a onclick="navigate('post',{id:${p.id}})" style="color:#005f99;cursor:pointer">${escHtml(p.subject)}</a></td>
            <td>${fmtDate(p.date)}</td>
            <td style="font-size:0.8rem">${escHtml(p.seo_keywords || '')}</td>
            <td>
              <div class="td-actions">
                <button class="btn btn-secondary btn-sm" onclick="navigate('editor',{id:${p.id}})">Edit</button>
                <button class="btn btn-danger btn-sm" onclick="deletePost(${p.id})">Delete</button>
              </div>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

// ─── Post editor ──────────────────────────────────────────────────────────────
async function setupEditor(postId) {
  hideAlert('editor-alert');
  document.getElementById('editor-post-id').value = postId || '';
  document.getElementById('editor-title').textContent = postId ? 'Edit Post' : 'New Post';
  document.getElementById('editor-submit-btn').textContent = postId ? 'Save Changes' : 'Create Post';

  if (postId) {
    const { ok, data } = await api('GET', `/posts/${postId}`);
    if (!ok) { showAlert('editor-alert', 'Failed to load post', 'error'); return; }
    document.getElementById('editor-subject').value = data.subject || '';
    document.getElementById('editor-date').value    = fmtDate(data.date);
    document.getElementById('editor-rss').value     = data.rss_description || '';
    document.getElementById('editor-seo').value     = data.seo_keywords || '';
    document.getElementById('editor-body').value    = data.body || '';
  } else {
    document.getElementById('editor-form').reset();
    document.getElementById('editor-date').value = new Date().toISOString().substring(0, 10);
  }
}

async function submitPost(e) {
  e.preventDefault();
  hideAlert('editor-alert');
  const btn    = document.getElementById('editor-submit-btn');
  const postId = document.getElementById('editor-post-id').value;
  const payload = {
    subject:         document.getElementById('editor-subject').value,
    date:            document.getElementById('editor-date').value,
    rss_description: document.getElementById('editor-rss').value,
    seo_keywords:    document.getElementById('editor-seo').value,
    body:            document.getElementById('editor-body').value,
  };

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Saving…';

  const { ok, data } = postId
    ? await api('PUT',  `/posts/${postId}`, payload)
    : await api('POST', '/posts',           payload);

  btn.disabled = false;
  btn.textContent = postId ? 'Save Changes' : 'Create Post';

  if (ok) {
    showGlobalAlert(postId ? 'Post updated.' : `Post created (id ${data.id}).`, 'success');
    navigate('admin');
  } else {
    showAlert('editor-alert', data.error || 'Save failed', 'error');
  }
}

// ─── Delete post ──────────────────────────────────────────────────────────────
async function deletePost(id) {
  if (!confirm(`Delete post #${id}? This cannot be undone.`)) return;
  const { ok, data } = await api('DELETE', `/posts/${id}`);
  if (ok) {
    showGlobalAlert('Post deleted.', 'success');
    if (currentView === 'admin') loadAdminPosts();
    else navigate('posts');
  } else {
    showGlobalAlert(data.error || 'Delete failed', 'error');
  }
}

// ─── File upload ──────────────────────────────────────────────────────────────
function resetUpload() {
  selectedUploadFile = null;
  document.getElementById('upload-file-input').value = '';
  document.getElementById('upload-filename').textContent = '';
  document.getElementById('upload-progress-area').style.display = 'none';
  document.getElementById('upload-btn').disabled = true;
  hideAlert('upload-alert');
}

function fileSelected(file) {
  if (!file) return;
  selectedUploadFile = file;
  document.getElementById('upload-filename').textContent = `Selected: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
  document.getElementById('upload-btn').disabled = false;
  document.getElementById('upload-progress-area').style.display = 'none';
}

// Drag and drop
const dropZone = document.getElementById('upload-drop');
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) { document.getElementById('upload-file-input').files = e.dataTransfer.files; fileSelected(file); }
});

async function startUpload() {
  if (!selectedUploadFile) return;
  hideAlert('upload-alert');

  const btn      = document.getElementById('upload-btn');
  const progress = document.getElementById('upload-progress-area');
  const bar      = document.getElementById('upload-progress-bar');
  const status   = document.getElementById('upload-status');
  const internal = document.getElementById('upload-bucket').value === 'internal';

  btn.disabled = true;
  progress.style.display = 'block';
  bar.value = 10;
  status.textContent = 'Requesting upload URL…';

  // Step 1: get presigned URL
  const { ok, data } = await api('POST', '/uploads/presign', {
    filename:     selectedUploadFile.name,
    content_type: selectedUploadFile.type || 'application/octet-stream',
    internal,
  });

  if (!ok) {
    showAlert('upload-alert', data.error || 'Could not get upload URL', 'error');
    btn.disabled = false;
    bar.value = 0;
    return;
  }

  bar.value = 30;
  status.textContent = `Uploading ${data.key}…`;

  // Step 2: PUT directly to S3
  try {
    const s3Resp = await fetch(data.upload_url, {
      method:  'PUT',
      headers: { 'Content-Type': selectedUploadFile.type || 'application/octet-stream' },
      body:    selectedUploadFile,
    });

    if (s3Resp.ok) {
      bar.value = 100;
      status.textContent = 'Upload complete!';
      showAlert('upload-alert', `"${data.key}" uploaded successfully.`, 'success');
      selectedUploadFile = null;
      document.getElementById('upload-btn').disabled = true;
    } else {
      throw new Error(`S3 responded with ${s3Resp.status}`);
    }
  } catch (err) {
    showAlert('upload-alert', `Upload failed: ${err.message}`, 'error');
    bar.value = 0;
    btn.disabled = false;
  }
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
renderNav();
navigate('posts');
</script>
