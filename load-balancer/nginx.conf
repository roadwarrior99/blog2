user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    upstream vacuumflask {
        server project.internal.cmh.sh:8080  max_fails=3 fail_timeout=30s;
        least_conn;
    }

    upstream blog1 {
        server project.internal.cmh.sh:85  max_fails=3 fail_timeout=30s;
    }

    # ── HTTP: ACME challenge + redirect ──────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let certbot serve the webroot challenge files
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Shared SSL settings ───────────────────────────────────────────────────
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 120m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── blog.cmh.sh / blog4.cmh.sh → vacuumflask ────────────────────────────
    server {
        listen 443 ssl;
        server_name blog.cmh.sh blog4.cmh.sh;

        ssl_certificate     /etc/letsencrypt/live/cmh.sh/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cmh.sh/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/cmh.sh/chain.pem;

        client_max_body_size 1500M;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        location / {
            proxy_pass http://vacuumflask;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── cmh.sh / ots.cmh.sh → blog1 ─────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name cmh.sh ots.cmh.sh;

        ssl_certificate     /etc/letsencrypt/live/cmh.sh/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cmh.sh/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/cmh.sh/chain.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        location / {
            proxy_pass http://blog1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── colinhayes.dev → blog1 ───────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name colinhayes.dev blog.colinhayes.dev about.colinhayes.dev links.colinhayes.dev;

        ssl_certificate     /etc/letsencrypt/live/colinhayes.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/colinhayes.dev/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/colinhayes.dev/chain.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        location / {
            proxy_pass http://blog1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
