# Minimal HTTP-only config used during initial Let's Encrypt provisioning.
# nginx starts with this config (no SSL needed), certbot completes the
# webroot challenge, then the main nginx.conf takes over.
events { worker_connections 1024; }

http {
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 200 'ready';
            add_header Content-Type text/plain;
        }
    }
}
